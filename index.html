<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Curve Optimization | HMI Lab</title>
    <link rel="stylesheet" href="style/ui_feedback.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body class="theme-linear">
    <div class="container">
        <header>
            <h1>Response Curve Optimization</h1>
            <div id="status-badge" class="status-badge">Linear Profile</div>
        </header>

        <main class="control-grid">
            <!-- Left Side: Controls -->
            <section class="control-panel">
                <div class="input-group">
                    <label for="joystick-input">Joystick Input (x): <span id="input-val">0.00</span></label>
                    <input type="range" id="joystick-input" min="-1" max="1" step="0.01" value="0">
                </div>

                <div class="input-group">
                    <label for="k-slider">Sensitivity (k): <span id="k-val">0.00</span></label>
                    <input type="range" id="k-slider" min="0" max="1" step="0.01" value="0">
                </div>

                <div class="input-group">
                    <label>Presets</label>
                    <div class="button-group">
                        <button id="btn-linear" class="active">Linear (k=0)</button>
                        <button id="btn-precision">Precision (k=0.5)</button>
                        <button id="btn-aggressive">Aggressive (k=0.8)</button>
                    </div>
                </div>
            </section>

            <!-- Right Side: Visualization -->
            <section class="viz-panel">
                <label>System Output (y)</label>
                <div class="value-display" id="output-val">0.00</div>
                <div class="gauge-container">
                    <div class="gauge-center"></div>
                    <div id="output-bar" class="gauge-bar"></div>
                </div>
                <p style="font-size: 0.75rem; color: #64748b; margin-top: 1rem;">
                    Formula: y = (1 - k)x + kx³
                </p>
            </section>
        </main>
    </div>

    <script src="js/math_engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const engine = new MathEngine(0);
            
            // Elements
            const joystickInput = document.getElementById('joystick-input');
            const kSlider = document.getElementById('k-slider');
            const inputDisplay = document.getElementById('input-val');
            const kDisplay = document.getElementById('k-val');
            const outputDisplay = document.getElementById('output-val');
            const outputBar = document.getElementById('output-bar');
            const statusBadge = document.getElementById('status-badge');
            
            const btnLinear = document.getElementById('btn-linear');
            const btnPrecision = document.getElementById('btn-precision');
            const btnAggressive = document.getElementById('btn-aggressive');

            function updateUI() {
                const x = parseFloat(joystickInput.value);
                const k = parseFloat(kSlider.value);
                
                engine.setK(k);
                const y = engine.calculate(x);
                
                // Update text
                inputDisplay.textContent = x.toFixed(2);
                kDisplay.textContent = k.toFixed(2);
                outputDisplay.textContent = y.toFixed(2);
                
                // Update bar visualization (center is 50%)
                const width = Math.abs(y) * 50;
                outputBar.style.width = `${width}%`;
                outputBar.style.left = y >= 0 ? '50%' : `${50 - width}%`;
                
                // Update theme classes
                document.body.classList.remove('theme-precision', 'theme-aggressive', 'theme-linear');
                const profile = engine.getProfileName();
                statusBadge.textContent = `${profile} Profile`;
                
                if (profile === "Precision") document.body.classList.add('theme-precision');
                else if (profile === "Aggressive") document.body.classList.add('theme-aggressive');
                else document.body.classList.add('theme-linear');
            }

            // Events
            joystickInput.addEventListener('input', updateUI);
            kSlider.addEventListener('input', updateUI);

            btnLinear.addEventListener('click', () => {
                kSlider.value = 0;
                setActiveButton(btnLinear);
                updateUI();
            });

            btnPrecision.addEventListener('click', () => {
                kSlider.value = 0.5;
                setActiveButton(btnPrecision);
                updateUI();
            });

            btnAggressive.addEventListener('click', () => {
                kSlider.value = 0.8;
                setActiveButton(btnAggressive);
                updateUI();
            });

            function setActiveButton(activeBtn) {
                [btnLinear, btnPrecision, btnAggressive].forEach(btn => {
                    btn.classList.remove('active');
                });
                activeBtn.classList.add('active');
            }

            // Initial call
            updateUI();
        });
    </script>
</body>
</html>
